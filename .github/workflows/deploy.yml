name: Deploy to EC2

on:
  push:
    branches:
      - main # Triggers when you merge/push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1 # Change to your AWS Region

      # 3. Log in to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build, tag, and push image to Amazon ECR
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: spraada/frontend # Match your ECR repo name
          IMAGE_TAG: latest
        run: |
          # Create the repository if it doesn't exist
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
            aws ecr create-repository --repository-name $ECR_REPOSITORY

          docker build \
            --build-arg NEXT_PUBLIC_BACKEND_API_URL=${{ secrets.NEXT_PUBLIC_BACKEND_API_URL }} \
            --build-arg NEXT_PUBLIC_FRONTEND_URL=${{ secrets.NEXT_PUBLIC_FRONTEND_URL }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. # SSH into EC2, pass the password, log in, and deploy
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 1. Instruct the SSH action to export the ECR_PASSWORD environment variable on the EC2
          envs: |
            ECR_PASSWORD
          script: |
            # 2. Check if the password reached the server before running login
            if [ -z "$ECR_PASSWORD" ]; then
              echo "Error: ECR_PASSWORD is empty!"
              exit 1
            fi

            # 3. Log in directly using the passed password
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin 777327796579.dkr.ecr.eu-central-1.amazonaws.com

            # 4. Pull the correct image name (using / instead of - to match your registry)
            docker pull 777327796579.dkr.ecr.eu-central-1.amazonaws.com/spraada/frontend:latest

            # 5. Stop and remove the old container if it exists
            docker stop spraada-app || true
            docker rm spraada-app || true

            # 6. Run the fresh container mapping port 80 to 3000
            docker run -d --name spraada-app -p 80:3000 777327796579.dkr.ecr.eu-central-1.amazonaws.com/spraada/frontend:latest
        env:
          # 3. Map the ECR login password output to the environment variable
          ECR_PASSWORD: ${{ steps.login-ecr.outputs.password }}
