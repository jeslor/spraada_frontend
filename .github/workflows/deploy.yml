name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 1. Build and Push
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: spraada/frontend
          IMAGE_TAG: latest
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
            aws ecr create-repository --repository-name $ECR_REPOSITORY

          docker build \
            --build-arg NEXT_PUBLIC_BACKEND_API_URL=${{ secrets.NEXT_PUBLIC_BACKEND_API_URL }} \
            --build-arg NEXT_PUBLIC_FRONTEND_URL=${{ secrets.NEXT_PUBLIC_FRONTEND_URL }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 2. NEW: Clean up old untagged images in ECR to save storage costs
      - name: Clean Up Old ECR Images
        env:
          ECR_REPOSITORY: spraada/frontend
        run: |
          echo "Finding old untagged images in ECR..."
          IMAGES_TO_DELETE=$(aws ecr list-images --repository-name $ECR_REPOSITORY --filter "tagStatus=UNTAGGED" --query 'imageIds[*]' --output json)

          if [ "$IMAGES_TO_DELETE" != "[]" ] && [ ! -z "$IMAGES_TO_DELETE" ]; then
            echo "Deleting old untagged images..."
            aws ecr batch-delete-image --repository-name $ECR_REPOSITORY --image-ids "$IMAGES_TO_DELETE"
            echo "ECR cleanup complete."
          else
            echo "No untagged images found in ECR. Skipping cleanup."
          fi

      - name: Get ECR Login Password
        id: get-token
        run: |
          echo "password=$(aws ecr get-login-password --region eu-central-1)" >> $GITHUB_OUTPUT

      # 3. SSH into EC2 & run the container with the runtime SESSION_SECRET
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_PASSWORD: ${{ steps.get-token.outputs.password }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_PASSWORD, SESSION_SECRET
          script: |
            if [ -z "$ECR_PASSWORD" ]; then
              echo "Error: ECR_PASSWORD is empty!"
              exit 1
            fi

            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin 777327796579.dkr.ecr.eu-central-1.amazonaws.com

            docker pull 777327796579.dkr.ecr.eu-central-1.amazonaws.com/spraada/frontend:latest

            docker stop spraada-app || true
            docker rm spraada-app || true

            # Run the container and inject the secret at runtime
            docker run -d \
              --name spraada-app \
              -p 3000:3000 \
              -e SESSION_SECRET="$SESSION_SECRET" \
              -e NEXTAUTH_SECRET="$SESSION_SECRET" \
              777327796579.dkr.ecr.eu-central-1.amazonaws.com/spraada/frontend:latest

            docker image prune -a -f
